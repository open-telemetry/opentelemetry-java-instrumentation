display_name: GraphQL Java
description: This instrumentation enables spans for GraphQL operations.
semantic_conventions:
  - GRAPHQL_SERVER_SPANS
library_link: https://www.graphql-java.com/
configurations:
  - name: otel.instrumentation.graphql.capture-query
    declarative_name: java.graphql.capture_query
    description: Whether to capture the query in `graphql.document` span attribute.
    type: boolean
    default: true
  - name: otel.instrumentation.graphql.query-sanitization.enabled
    declarative_name: java.graphql.query_sanitization.enabled
    description: Enables sanitization of sensitive information from queries so they aren't added as span attributes.
    type: boolean
    default: true
  - name: otel.instrumentation.graphql.operation-name-in-span-name.enabled
    declarative_name: java.graphql.operation_name_in_span_name.enabled
    description: >
      Whether GraphQL operation name is added to the span name. WARNING: The GraphQL operation name is
      provided by the client and can have high cardinality. Use only when the server is not exposed to malicious
      clients.
    type: boolean
    default: false
  - name: otel.instrumentation.graphql.data-fetcher.enabled
    declarative_name: java.graphql.data_fetcher.enabled
    description: Enables span generation for data fetchers.
    type: boolean
    default: false
  - name: otel.instrumentation.graphql.trivial-data-fetcher.enabled
    declarative_name: java.graphql.trivial_data_fetcher.enabled
    description: Whether to create spans for trivial data fetchers. A trivial data fetcher is one that simply maps data from an object to a field.
    type: boolean
    default: false
  - name: otel.instrumentation.graphql.operation-span.enabled
    declarative_name: java.graphql.operation_span.enabled
    description: >
      Whether to create the GraphQL operation span. When disabled, no `GraphQL Operation` span is created; data
      fetcher spans, if enabled, are unaffected.
    type: boolean
    default: true
  - name: otel.instrumentation.graphql.add-attributes-to-local-root-span
    declarative_name: java.graphql.add_attributes_to_local_root_span
    description: >
      Whether to add GraphQL attributes (graphql.operation.name, graphql.operation.type, graphql.document) and
      exception events to the local root span (typically the enclosing HTTP server span), in addition to or instead
      of the operation span.
    type: boolean
    default: false
  - name: otel.instrumentation.graphql.promote-error-status-to-local-root-span
    declarative_name: java.graphql.promote_error_status_to_local_root_span
    description: >
      Whether to set the local root span status to ERROR when the GraphQL result contains any errors. WARNING: This
      marks the enclosing (e.g. server) span as errored for any GraphQL error, including partial errors on an HTTP 200
      response.
    type: boolean
    default: false
