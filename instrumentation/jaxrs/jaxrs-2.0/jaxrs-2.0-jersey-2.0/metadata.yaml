display_name: Eclipse Jersey JAX-RS 2.x
description: >
  This instrumentation enriches HTTP server spans with route information, and enables controller
  spans for JAX-RS methods when using Jersey (controller spans are disabled by default).
library_link: https://eclipse-ee4j.github.io/jersey/
features:
  - HTTP_ROUTE
  - CONTROLLER_SPANS
configurations:
  - ref: common.controller-telemetry.enabled
  - name: otel.instrumentation.jaxrs.experimental-span-attributes
    declarative_name: java.jaxrs.experimental_span_attributes/development
    type: boolean
    description: Enables the experimental `jaxrs.canceled` span attribute.
    default: false
