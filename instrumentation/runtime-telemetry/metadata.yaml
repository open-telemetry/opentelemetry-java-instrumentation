display_name: JVM Runtime Telemetry
description: >
  This instrumentation enables JVM runtime metrics using JMX (Java 8+) and JFR (Java 17+) to
  monitor classes, CPU, garbage collection, memory, and threads.
semantic_conventions:
  - JVM_RUNTIME_METRICS
library_link: https://github.com/open-telemetry/opentelemetry-java-instrumentation/tree/main/instrumentation/runtime-telemetry
configurations:
  - name: otel.instrumentation.runtime-telemetry.emit-experimental-metrics
    declarative_name: java.runtime_telemetry.emit_experimental_metrics/development
    description: Enables the capture of experimental JMX-based JVM runtime metrics.
    type: boolean
    default: false
  - name: otel.instrumentation.runtime-telemetry.emit-experimental-jfr-metrics
    declarative_name: java.runtime_telemetry.emit_experimental_jfr_metrics/development
    description: >
      Enables the capture of experimental JFR-based JVM runtime metrics on Java 17+.
    type: boolean
    default: false
  - name: otel.instrumentation.runtime-telemetry.emit-experimental-telemetry
    declarative_name: java.runtime_telemetry.emit_experimental_telemetry/development
    description: >
      Deprecated. Use `otel.instrumentation.runtime-telemetry.emit-experimental-metrics`
      instead.
    type: boolean
    default: false
  - name: otel.instrumentation.runtime-telemetry.experimental.prefer-jfr
    declarative_name: java.runtime_telemetry.prefer_jfr/development
    description: >
      Prefer JFR over JMX for metrics available from both sources, on Java 17+. When enabled,
      overlapping metrics are collected via JFR and the corresponding JMX metrics are suppressed.
    type: boolean
    default: false
  - name: otel.instrumentation.runtime-telemetry.capture-gc-cause
    declarative_name: java.runtime_telemetry.capture_gc_cause
    description: >
      Deprecated. Enables the capture of the `jvm.gc.cause` attribute, which will always be
      captured in 3.0.
    type: boolean
    default: false
  - name: otel.instrumentation.runtime-telemetry.experimental.package-emitter.enabled
    declarative_name: java.runtime_telemetry.package_emitter/development.enabled
    description: Enables creating events for JAR libraries used by the application.
    type: boolean
    default: false
  - name: otel.instrumentation.runtime-telemetry.package-emitter.enabled
    declarative_name: java.runtime_telemetry.package_emitter.enabled
    description: >
      Deprecated. Use `otel.instrumentation.runtime-telemetry.experimental.package-emitter.enabled`
      instead.
    type: boolean
    default: false
  - name: otel.instrumentation.runtime-telemetry.experimental.package-emitter.jars-per-second
    declarative_name: java.runtime_telemetry.package_emitter/development.jars_per_second
    description: The number of JAR files processed per second by the package emitter.
    type: int
    default: 10
  - name: otel.instrumentation.runtime-telemetry.package-emitter.jars-per-second
    declarative_name: java.runtime_telemetry.package_emitter.jars_per_second
    description: >
      Deprecated. Use
      `otel.instrumentation.runtime-telemetry.experimental.package-emitter.jars-per-second`
      instead.
    type: int
    default: 10
  - name: otel.instrumentation.runtime-telemetry-java17.enabled
    declarative_name: java.runtime_telemetry_java17.enabled
    description: >
      Deprecated. Use `otel.instrumentation.runtime-telemetry.emit-experimental-jfr-metrics`
      instead.
    type: boolean
    default: false
  - name: otel.instrumentation.runtime-telemetry-java17.enable-all
    declarative_name: java.runtime_telemetry_java17.enable_all
    description: >
      Deprecated. Use `otel.instrumentation.runtime-telemetry.emit-experimental-jfr-metrics`
      and `otel.instrumentation.runtime-telemetry.experimental.prefer-jfr` instead.
    type: boolean
    default: false
