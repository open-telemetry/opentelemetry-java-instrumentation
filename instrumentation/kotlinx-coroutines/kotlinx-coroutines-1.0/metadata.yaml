description: >
  This instrumentation enables context propagation for Kotlin coroutines and adds support for
  @WithSpan annotations on Kotlin suspend functions.
display_name: Kotlin Coroutines
features:
  - CONTEXT_PROPAGATION
library_link: https://github.com/Kotlin/kotlinx.coroutines
configurations:
  - name: otel.instrumentation.kotlinx-coroutines.check-class
    declarative_name: java.kotlinx_coroutines.check_class
    type: boolean
    description: Enables ASM verification of transformed bytecode.
    default: false
