display_name: Couchbase Client
description: >
  This instrumentation enables database client spans and database client metrics for Couchbase 2.0
  operations. It automatically traces key-value operations (get, upsert, replace, remove), view
  queries, N1QL queries, and cluster management operations.
semantic_conventions:
  - DATABASE_CLIENT_SPANS
  - DATABASE_CLIENT_METRICS
library_link: https://github.com/couchbase/couchbase-java-client
configurations:
  - name: otel.instrumentation.couchbase.experimental-span-attributes
    declarative_name: java.couchbase.experimental_span_attributes/development
    description: >
      Enables experimental span attributes `couchbase.operation_id` and
      `couchbase.local.address`. Different operation types receive different experimental
      attributes.
    type: boolean
    default: false
  - name: otel.instrumentation.common.db.query-sanitization.enabled
    declarative_name: java.common.db.query_sanitization.enabled
    description: Enables query sanitization for database queries.
    type: boolean
    default: true
