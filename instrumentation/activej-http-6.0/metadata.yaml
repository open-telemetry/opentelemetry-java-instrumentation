display_name: ActiveJ
description: This instrumentation enables HTTP server spans and HTTP server metrics for the ActiveJ HTTP server.
library_link: https://activej.io/
semantic_conventions:
  - HTTP_SERVER_SPANS
  - HTTP_SERVER_METRICS
configurations:
  - ref: http.known-methods
  - ref: http.server.capture-request-headers
  - ref: http.server.capture-response-headers
  - ref: http.server.emit-experimental-telemetry
