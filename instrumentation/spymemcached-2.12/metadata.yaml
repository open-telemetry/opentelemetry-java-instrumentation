description: >
  This instrumentation enables database client spans and database client metrics for Memcached
  operations using the Spymemcached client.
display_name: Spymemcached
semantic_conventions:
  - DATABASE_CLIENT_SPANS
  - DATABASE_CLIENT_METRICS
library_link: https://github.com/couchbase/spymemcached
configurations:
  - name: otel.instrumentation.spymemcached.experimental-span-attributes
    declarative_name: java.spymemcached.experimental_span_attributes/development
    description: >
      Enables experimental span attributes `spymemcached.result` and
      `spymemcached.command.cancelled`.
    type: boolean
    default: false
  - name: otel.instrumentation.spymemcached.query-sanitization.enabled
    declarative_name: java.spymemcached.query_sanitization.enabled
    description: >
      Enables query sanitization for Memcached commands. Takes precedence over
      otel.instrumentation.common.db.query-sanitization.enabled.
    type: boolean
    default: true
  - name: otel.instrumentation.common.db.query-sanitization.enabled
    declarative_name: java.common.db.query_sanitization.enabled
    description: Enables query sanitization for database queries.
    type: boolean
    default: true
