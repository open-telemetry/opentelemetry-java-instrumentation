display_name: Vaadin
description: >
  This instrumentation enriches HTTP server spans with route information, and enables controller
  spans for Vaadin applications (controller spans are disabled by default).
library_link: https://vaadin.com/
features:
  - HTTP_ROUTE
  - CONTROLLER_SPANS
configurations:
  - name: otel.instrumentation.common.experimental.controller-telemetry.enabled
    declarative_name: java.common.controller_telemetry/development.enabled
    description: Enables the creation of experimental controller spans.
    type: boolean
    default: false
