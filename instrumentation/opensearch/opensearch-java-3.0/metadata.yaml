display_name: OpenSearch Java Client
description: >
  This instrumentation enables database client spans and database client metrics for the OpenSearch
  Java client.
library_link: https://docs.opensearch.org/latest/clients/java/
semantic_conventions:
  - DATABASE_CLIENT_SPANS
  - DATABASE_CLIENT_METRICS
configurations:
  - name: otel.instrumentation.opensearch.capture-search-query
    declarative_name: java.opensearch.capture_search_query
    description: >
      Enable the capture of sanitized search query bodies. Search queries may contain personal or
      sensitive information.
    type: boolean
    default: true
