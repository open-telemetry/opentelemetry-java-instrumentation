display_name: SOFARPC
description: >
  The SOFARPC instrumentation provides RPC client spans and metrics, and RPC server spans and
  metrics for SOFARPC RPC calls.
semantic_conventions:
  - RPC_CLIENT_SPANS
  - RPC_CLIENT_METRICS
  - RPC_SERVER_SPANS
  - RPC_SERVER_METRICS
library_link: https://github.com/sofastack/sofa-rpc/
configurations:
  - name: otel.instrumentation.common.peer-service-mapping
    declarative_name: java.common.service_peer_mapping
    description: Used to specify a mapping from host names or IP addresses to peer services.
    type: map
    default: ''
    declarative_type: structured_list
    declarative_schema:
      type: object
      required:
        - peer
        - service_name
      properties:
        peer:
          type: string
          description: Host name or IP address to match against.
        service_name:
          type: string
          description: Peer service name to record for matching peers.
