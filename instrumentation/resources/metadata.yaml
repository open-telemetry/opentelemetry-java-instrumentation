display_name: Resource Detectors
description: >
  This instrumentation automatically detects and populates OpenTelemetry resource attributes for
  the host, OS, process, and container environment. It does not emit any telemetry on its own.
features:
  - RESOURCE_DETECTOR
configurations:
  # No declarative_name: declarative resource detection uses the separate process detector schema,
  # which currently has no toggle for these attributes.
  - name: otel.instrumentation.resources.experimental.process-command-attributes.enabled
    description: >
      Enables capture of process command-line resource attributes when v3 preview suppresses them
      by default.
    type: boolean
    default: false
