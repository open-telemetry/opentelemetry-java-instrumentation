display_name: Helidon
description: This instrumentation enables HTTP server spans and HTTP server metrics for the Helidon HTTP server.
library_link: https://helidon.io/
semantic_conventions:
  - HTTP_SERVER_SPANS
  - HTTP_SERVER_METRICS
features:
  - HTTP_ROUTE
configurations:
  - ref: http.known-methods
  - ref: http.server.capture-request-headers
  - ref: http.server.capture-response-headers
  - ref: http.server.emit-experimental-telemetry
