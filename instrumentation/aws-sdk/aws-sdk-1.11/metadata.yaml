display_name: AWS SDK
description: >
  This instrumentation covers the AWS SDK 1.11+ client library, enabling messaging and client spans
  and metrics for calls to AWS services including DynamoDB, EC2, Kinesis, Lambda, RDS, S3, secrets
  manager, SNS/SQS and step functions.
library_link: https://aws.amazon.com/sdk-for-java/
semantic_conventions:
  - HTTP_CLIENT_SPANS
  - DATABASE_CLIENT_SPANS
  - DATABASE_CLIENT_METRICS
  - MESSAGING_SPANS
  - GENAI_CLIENT_SPANS
  - GENAI_CLIENT_METRICS
configurations:
  - name: otel.instrumentation.aws-sdk.experimental-span-attributes
    declarative_name: java.aws_sdk.span_attributes/development
    description: >
      Enables the experimental span attributes `aws.agent`, `aws.queue.name`, `aws.lambda.function.arn` and
      `aws.lambda.function.name` for AWS SDK instrumentation.
    type: boolean
    default: false
  - name: otel.instrumentation.messaging.experimental.receive-telemetry.enabled
    declarative_name: java.common.messaging.receive_telemetry/development.enabled
    description: >
      Enables experimental receive telemetry, which will cause consumers to start a new trace, with
      only a span link connecting it to the producer trace.
    type: boolean
    default: false
  - name: otel.instrumentation.messaging.experimental.capture-headers
    declarative_name: java.common.messaging.capture_headers/development
    description: Allows configuring headers to capture as span attributes.
    type: list
    default: ''
