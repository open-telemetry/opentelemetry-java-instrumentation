[tools]
lychee = "0.23.0"
markdownlint-cli2 = "0.22.0"

[settings]
# Only install tools explicitly defined in the [tools] section above
idiomatic_version_file_enable_tools = []

# Windows configuration for file-based tasks
# Based on: https://github.com/jdx/mise/discussions/4461
windows_executable_extensions = ["sh"]
windows_default_file_shell_args = "bash"
use_file_shell_for_executable_tasks = true

# Pick the tasks you need from flint (https://github.com/grafana/flint)
[tasks."lint:links"]
description = "Check for broken links in changed files + all local links"
file = "https://raw.githubusercontent.com/grafana/flint/8a39d96e17327c54974623b252eb5260d67ed68a/tasks/lint/links.sh" # v0.9.1

[tasks."lint:spotless"]
description = "Check Java formatting with Spotless"
run = "./gradlew spotlessCheck"

[tasks.lint]
description = "Run all lints"
depends = ["lint:links", "lint:markdown", "lint:spotless"]

[tasks.fix]
description = "Auto-fix lint issues"
run = ["./gradlew spotlessApply", "mise run lint:markdown -- --fix"]

[tasks.pre-commit]
description = "Pre-commit hook: lint changed files"
depends = ["lint"]
[tasks."setup:pre-commit-hook"]
description = "Install git pre-commit hook"
run = "mise generate git-pre-commit --write --task=pre-commit"
