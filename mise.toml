[tools]

# Linters
"cargo:https://github.com/grafana/flint" = "rev:4ba41a6"
google-java-format = "1.35.0"
lychee = "0.24.2"
rumdl = "0.2.32"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"
