# This file is generated and should not be manually edited.
# It shows all available instrumentation configurations in declarative config format.

general:
  http:
    client:
      # List of HTTP request headers to capture in HTTP client telemetry.
      request_captured_headers: []

      # List of HTTP response headers to capture in HTTP client telemetry.
      response_captured_headers: []
    server:
      # List of HTTP request headers to capture in HTTP server telemetry.
      request_captured_headers: []

      # List of HTTP response headers to capture in HTTP server telemetry.
      response_captured_headers: []
  semconv_stability:
    # Opt-in to emit stable semantic conventions instead of the old experimental semantic
    # conventions. Accepts a comma-separated list of semantic convention groups (e.g., `database`,
    # `http`, `messaging`). Use `<group>/dup` to emit both old and new conventions simultaneously.
    # Stable semantic conventions will become the default in version 3.0 of the agent.
    opt_in: []
instrumentation:
  java:
    apache_elasticjob:
      # Enables experimental span attributes `job.system`, `scheduling.apache-elasticjob.job.name`,
      # `scheduling.apache-elasticjob.task.id`, `scheduling.apache-elasticjob.sharding.item.index`,
      # `scheduling.apache-elasticjob.sharding.total.count`,
      # `scheduling.apache-elasticjob.sharding.item.parameter`, and
      # `scheduling.apache-elasticjob.job.type`.
      span_attributes/development: false
    apache_shenyu:
      # Enables experimental `apache-shenyu.meta.` prefixed span attributes `app-name`,
      # `service-name`, `context-path`, `param-types`, `id`, `method-name`, `rpc-type`, `path` and
      # `rpc-ext`.
      span_attributes/development: false
    aws_lambda:
      # Flush timeout in milliseconds.
      flush_timeout: 10000
    aws_sdk:
      # Determines whether errors returned by each individual HTTP request should be recorded as
      # events for the SDK span.
      record_individual_http_error/development: false

      # Enables the experimental span attributes `aws.agent`, `aws.queue.name`,
      # `aws.lambda.function.arn` and `aws.lambda.function.name` for AWS SDK instrumentation.
      span_attributes/development: false

      # Determines whether the configured TextMapPropagator should be used to inject into supported
      # messaging attributes (for SQS).
      use_propagator_for_messaging/development: false
    camel:
      # Enable the capture of experimental `camel.uri`, `camel.kafka.partitionKey`,
      # `camel.kafka.key` and `camel.kafka.offset` span attributes.
      span_attributes/development: false
    common:
      controller_telemetry:
        # Enables the creation of experimental controller spans.
        enabled/development: false
      db:
        query_sanitization:
          # Enables query sanitization for database queries.
          enabled: true
      enduser:
        id:
          # Enables capturing the enduser.id attribute.
          enabled: false
        role:
          # Enables capturing the enduser.role attribute.
          enabled: false
        scope:
          # Enables capturing the enduser.scope attribute.
          enabled: false
      logging:
        # Specifies the key name used to store the span ID in the logging context.
        span_id: span_id

        # Specifies the key name used to store the trace flags in the logging context.
        trace_flags: trace_flags

        # Specifies the key name used to store the trace ID in the logging context.
        trace_id: trace_id
      mdc:
        # Specifies which resource attributes to add to the logging context as a comma-separated
        # list of attribute keys.
        resource_attributes: []
      messaging:
        # List of messaging headers to capture.
        capture_headers: []
        receive_telemetry:
          # Enables the creation of consumer spans on messaging receive operations. These spans will
          # measure the time between receiving a message and the consumer processing that message.
          enabled/development: false

      # Used to specify a mapping from host names or IP addresses to peer services.
      peer_service_mapping: {}
      view_telemetry:
        # Enables the creation of experimental view spans.
        enabled/development: false
    couchbase:
      # Enables experimental span attributes `couchbase.operation_id` and `couchbase.local.address`.
      # Different operation types receive different experimental attributes.
      span_attributes/development: false
    dropwizard_metrics:
      # Enables the dropwizard metrics instrumentation.
      enabled: false
    elasticsearch:
      # Enable the capture of search query bodies. It is important to note that Elasticsearch
      # queries may contain personal or sensitive information.
      capture_search_query: false

      # Enable the capture of `elasticsearch.action`, `elasticsearch.id`, `elasticsearch.request`,
      # `elasticsearch.request.indices`, `elasticsearch.request.write.type`,
      # `elasticsearch.request.write.version`, `elasticsearch.response.status`,
      # `elasticsearch.shard.replication.failed`, `elasticsearch.shard.replication.successful`,
      # `elasticsearch.shard.replication.total`, `elasticsearch.type`, and `elasticsearch.version`
      # experimental span attributes.
      span_attributes/development: false
    executors:
      # List of Executor subclasses to be instrumented.
      include: []

      # Whether to instrument all classes that implement the Executor interface.
      include_all: false
    external_annotations:
      # All methods to be excluded from auto-instrumentation by annotation-based advices.
      exclude_methods: ""

      # Configuration for trace annotations, in the form of a pattern that matches
      # `'package.Annotation$Name;*'`.
      include: ""
    genai:
      # Determines whether Generative AI events include full content of user and assistant messages.
      # Note that full content can have data privacy and size concerns and care should be taken when
      # enabling this
      capture_message_content: false
    graphql:
      data_fetcher:
        # Enables span generation for data fetchers.
        enabled: false
      operation_name_in_span_name:
        # Whether GraphQL operation name is added to the span name. WARNING: The GraphQL operation
        # name is provided by the client and can have high cardinality. Use only when the server is
        # not exposed to malicious clients.
        enabled: false
      query_sanitization:
        # Enables sanitization of sensitive information from queries so they aren't added as span
        # attributes.
        enabled: true
      trivial_data_fetcher:
        # Whether to create spans for trivial data fetchers. A trivial data fetcher is one that
        # simply maps data from an object to a field.
        enabled: false
    grpc:
      capture_metadata:
        client:
          # A comma-separated list of request metadata keys. gRPC client instrumentation will
          # capture metadata values corresponding to configured keys as span attributes.
          request: []
        server:
          # A comma-separated list of request metadata keys. gRPC server instrumentation will
          # capture metadata values corresponding to configured keys as span attributes.
          request: []

      # Determines whether to emit a span event for each individual message received and sent.
      emit_message_events: true

      # Enable the capture of experimental span attributes `grpc.received.message_count`,
      # `grpc.sent.message_count` and `grpc.canceled`.
      span_attributes/development: false
    guava:
      # Enables experimental span attribute `guava.canceled` for cancelled operations.
      span_attributes/development: false
    hibernate:
      # Enables the experimental `hibernate.session_id` span attribute.
      span_attributes/development: false
    http:
      client:
        # Enable the capture of experimental HTTP client telemetry. Adds the
        # `http.request.body.size` and `http.response.body.size` attributes to spans, and records
        # `http.client.request.size` and `http.client.response.size` metrics.
        emit_telemetry/development: false

        # Redact sensitive URL parameters. See
        # https://opentelemetry.io/docs/specs/semconv/http/http-spans.
        redact_query_parameters/development: true

      # Configures the instrumentation to recognize an alternative set of HTTP request methods. All
      # other methods will be treated as `_OTHER`.
      known_methods:
        - CONNECT
        - DELETE
        - GET
        - HEAD
        - OPTIONS
        - PATCH
        - POST
        - PUT
        - TRACE
      server:
        # Enable the capture of experimental HTTP server telemetry. Adds the
        # `http.request.body.size` and `http.response.body.size` attributes to spans, and records
        # `http.server.request.size` and `http.server.response.size` metrics.
        emit_telemetry/development: false
    hystrix:
      # Enables capturing the experimental `hystrix.command`, `hystrix.circuit_open` and
      # `hystrix.group` span attributes.
      span_attributes/development: false
    java_util_logging:
      # Enables capturing the experimental `thread.name` and `thread.id` log attributes.
      log_attributes/development: false
    jaxrs:
      # Enables the experimental `jaxrs.canceled` span attribute.
      span_attributes/development: false
    jboss_logmanager:
      # Enables the capture of the event name from the MDC attribute "event.name" and sets it as the
      # log record's event name.
      capture_event_name/development: false

      # Controls which MDC attributes to capture. Use "*" to capture all MDC attributes or provide a
      # comma-separated list of specific keys.
      capture_mdc_attributes/development: []

      # Enables the capture of experimental log attributes, including thread name and thread ID.
      log_attributes/development: false
    jdbc:
      # Sets whether the query parameters should be captured as span attributes named
      # <code>db.query.parameter.&lt;key&gt;</code>. Enabling this option disables the statement
      # sanitization.<p>WARNING: captured query parameters may contain sensitive information such as
      # passwords, personally identifiable information or protected health info.
      capture_query_parameters/development: false
      query_sanitization:
        # Enables query sanitization for database queries. Takes precedence over
        # otel.instrumentation.common.db.query-sanitization.enabled.
        enabled: true
      sqlcommenter:
        # Enables augmenting queries with a comment containing the tracing information. See
        # [sqlcommenter](https://google.github.io/sqlcommenter/) for more info. WARNING: augmenting
        # queries with tracing context will make query texts unique, which may have adverse impact
        # on database performance. Consult with database experts before enabling.
        enabled/development: false
      transaction:
        # Enables experimental instrumentation to create spans for COMMIT and ROLLBACK operations.
        enabled/development: false
    jdbc_datasource:
      # Enables instrumentation of JDBC datasource connections.
      enabled: false
    jsp:
      # Enables experimental span attributes `jsp.forwardOrigin`, `jsp.requestURL`, `jsp.compiler`,
      # and `jsp.classFQCN`.
      span_attributes/development: false
    kafka:
      producer_propagation:
        # Enable context propagation for Kafka message producers.
        enabled: true

      # Enables the capture of the experimental consumer attribute `kafka.record.queue_time_ms`.
      span_attributes/development: false
    kubernetes_client:
      # Enables experimental span attributes `kubernetes-client.namespace` and
      # `kubernetes-client.name` for Kubernetes API requests.
      span_attributes/development: false
    lettuce:
      command_encoding_events:
        # Enables capturing `redis.encode.start` and `redis.encode.end` span events.
        enabled/development: false
      connection_telemetry:
        # Enables connection telemetry spans for Redis connections.
        enabled: false

      # Enables experimental span attributes `lettuce.command.cancelled` and
      # `lettuce.command.results.count`.
      span_attributes/development: false
    log4j_appender:
      # Enables the capture of code location attributes, including file path, class name, method
      # name, and line number.
      capture_code_attributes/development: false

      # Enables the capture of the event name from the MDC attribute "event.name" and sets it as the
      # log record's event name.
      capture_event_name/development: false

      # Enables the capture of attributes from Log4j MapMessage instances.
      capture_map_message_attributes/development: false

      # Enables the capture of the Log4j marker attribute.
      capture_marker_attribute/development: false

      # Controls which MDC attributes to capture. Use "*" to capture all MDC attributes or provide a
      # comma-separated list of specific keys.
      capture_mdc_attributes/development: []

      # Enables the capture of experimental log attributes, including thread name and thread ID.
      log_attributes/development: false
    log4j_context_data:
      # Enables adding baggage entries to the Log4j ThreadContext, prefixed with "baggage.".
      add_baggage: false
    logback_appender:
      # Enables the capture of log message arguments as separate attributes.
      capture_arguments/development: false

      # Enables the capture of code location attributes, including file path, class name, method
      # name, and line number.
      capture_code_attributes/development: false

      # Enables the capture of the event name from the MDC attribute "event.name" and sets it as the
      # log record's event name.
      capture_event_name/development: false

      # Enables the capture of attributes from Logback key-value pairs.
      capture_key_value_pair_attributes/development: false

      # Enables the capture of attributes from the Logback logger context.
      capture_logger_context_attributes/development: false

      # Enables the capture of attributes from Logstash markers.
      capture_logstash_marker_attributes/development: false

      # Enables the capture of attributes from Logstash structured arguments.
      capture_logstash_structured_arguments/development: false

      # Enables the capture of the Logback marker attribute.
      capture_marker_attribute/development: false

      # Controls which MDC attributes to capture. Use "*" to capture all MDC attributes or provide a
      # comma-separated list of specific keys.
      capture_mdc_attributes/development: []

      # Enables the capture of the log message template before parameter substitution.
      capture_template/development: false

      # Enables the capture of experimental log attributes, including thread name and thread ID.
      log_attributes/development: false
    logback_mdc:
      # Enables adding baggage entries to the Logback MDC, prefixed with "baggage.".
      add_baggage: false
    messaging:
      # A comma-separated list of header names to capture as span attributes.
      capture_headers/development: []
      receive_telemetry:
        # Enables experimental receive telemetry, which will cause consumers to start a new trace,
        # with only a span link connecting it to the producer trace.
        enabled/development: false
    micrometer:
      # Sets the base time unit for the OpenTelemetry MeterRegistry. Supported values: ns, us, ms,
      # s, min, h, d.
      base_time_unit: s
      histogram_gauges:
        # Enables gauge-based Micrometer histograms for DistributionSummary and Timer instruments.
        enabled: false
      prometheus_mode:
        # Simulates the behavior of Micrometer's PrometheusMeterRegistry. The instruments will be
        # renamed to match Micrometer instrument naming, and the base time unit will be set to
        # seconds.
        enabled: false
    mongo:
      query_sanitization:
        # Enables query sanitization for MongoDB queries. Takes precedence over
        # otel.instrumentation.common.db.query-sanitization.enabled.
        enabled: true
    netty:
      connection_telemetry:
        # Enable the creation of Connect and DNS spans.
        enabled: false
      ssl_telemetry:
        # Enable SSL telemetry.
        enabled: false
    oshi:
      metrics:
        # Enable the experimental `runtime.java.memory` and `runtime.java.cpu_time` metrics.
        enabled/development: false
    powerjob:
      # Enables experimental span attributes `job.system`, `scheduling.powerjob.job.id`,
      # `scheduling.powerjob.job.param`, `scheduling.powerjob.job.instance.param`, and
      # `scheduling.powerjob.job.type`.
      span_attributes/development: false
    pulsar:
      # Enables capturing experimental span attribute `messaging.pulsar.message.type` on PRODUCER
      # spans.
      span_attributes/development: false
    quartz:
      # Enables the experimental `job.system` span attribute.
      span_attributes/development: false
    r2dbc:
      query_sanitization:
        # Enables query sanitization for database queries. Takes precedence over
        # otel.instrumentation.common.db.query-sanitization.enabled.
        enabled: true
      sqlcommenter:
        # Enables augmenting queries with a comment containing the tracing information. See
        # [sqlcommenter](https://google.github.io/sqlcommenter/) for more info. WARNING: augmenting
        # queries with tracing context will make query texts unique, which may have adverse impact
        # on database performance.
        enabled/development: false
    rabbitmq:
      # Enables experimental span attributes `rabbitmq.command`, `rabbitmq.delivery_mode`,
      # `rabbitmq.queue`, and `rabbitmq.record.queue_time_ms`.
      span_attributes/development: false
    reactor:
      # Enables the capture of the experimental `reactor.canceled` attribute on spans when reactive
      # streams are cancelled.
      span_attributes/development: false
    reactor_netty:
      connection_telemetry:
        # Enables the creation of Connect and DNS spans.
        enabled: false
    rocketmq_client:
      # Enables capturing experimental span attributes `messaging.rocketmq.message.tag`,
      # `messaging.rocketmq.broker_address`, `messaging.rocketmq.send_result`,
      # `messaging.rocketmq.queue_id`, and `messaging.rocketmq.queue_offset`.
      span_attributes/development: false
    runtime_telemetry:
      # Enables the capture of experimental JVM runtime metrics.
      emit_metrics/development: false
      package_emitter:
        # Enables creating events for JAR libraries used by the application.
        enabled/development: false

        # The number of JAR files processed per second by the package emitter.
        jars_per_second/development: 10

      # Prefers JFR over JMX for metrics where both collection methods are available (Java 17+).
      prefer_jfr/development: false
    rxjava:
      # Enables the experimental span attribute `rxjava.canceled`.
      span_attributes/development: false
    servlet:
      # List of request parameter names to capture as span attributes.
      capture_request_parameters: []

      # List of request parameter names to capture as span attributes.
      capture_request_parameters/development: []

      # Enables capturing the experimental `servlet.timeout` span attribute.
      span_attributes/development: false
      trace_id_request_attribute:
        # Enables adding the trace ID and span ID as request attributes for downstream servlet
        # access.
        enabled/development: true
    spring_batch:
      chunk:
        # When enabled, a new root span will be created for each chunk processing. Please note that
        # this may lead to a high number of spans being created.
        new_trace/development: false
      item:
        # When enabled, spans will be created for each item processed. Please note that this may
        # lead to a high number of spans being created.
        enabled: false

      # Adds the experimental attribute `job.system` to spans.
      span_attributes/development: false
    spring_cloud_gateway:
      # Enables experimental `spring-cloud-gateway.route` attributes (e.g.,
      # `spring-cloud-gateway.route.id`, `spring-cloud-gateway.route.uri`, etc.) on spans.
      span_attributes/development: false
    spring_integration:
      # A list of Spring channel name patterns that will be intercepted.
      global_channel_interceptor_patterns:
        - *
      producer:
        # Create producer spans when messages are sent to an output channel. Enable when you're
        # using a messaging library that doesn't have its own instrumentation for generating
        # producer spans. Note that the detection of output channels only works for Spring Cloud
        # Stream `DirectWithAttributesChannel`.
        enabled: false
    spring_scheduling:
      # Adds the experimental span attribute `job.system` with the value `spring_scheduling`.
      span_attributes/development: false
    spring_security:
      enduser:
        role:
          # Prefix of granted authorities identifying roles to capture in the `enduser.role`
          # semantic attribute.
          granted_authority_prefix: ROLE_
      scope:
        role:
          # Prefix of granted authorities identifying scopes to capture in the `enduser.scopes`
          # semantic attribute.
          granted_authority_prefix: SCOPE_
    spring_webmvc:
      # Enables the capture of experimental span attributes `spring-webmvc.view.name` and
      # `spring-webmvc.view.type`.
      span_attributes/development: false
    spymemcached:
      # Enables experimental span attributes `spymemcached.result` and
      # `spymemcached.command.cancelled`.
      span_attributes/development: false
    twilio:
      # Enables experimental span attributes `twilio.type`, `twilio.account`, `twilio.sid`, and
      # `twilio.status`.
      span_attributes/development: false
    xxl_job:
      # Enables experimental span attributes `job.system`, `scheduling.xxl-job.glue.type`, and
      # `scheduling.xxl-job.job.id`.
      span_attributes/development: false
