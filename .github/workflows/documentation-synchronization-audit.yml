name: Documentation Synchronization Audit (opentelemetry.io)

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run instrumentation analyzer (identify any module changes)
        run: ./gradlew :instrumentation-docs:runAnalysis

      - name: Run doc site audit
        run: ./gradlew :instrumentation-docs:docSiteAudit

  workflow-notification:
    permissions:
      contents: read
      issues: write
    needs:
      - crawl
    if: always()
    uses: ./.github/workflows/reusable-workflow-notification.yml
    with:
      success: ${{ needs.crawl.result == 'success' }}
      title: "Documentation sync needed: opentelemetry.io site out of sync"
