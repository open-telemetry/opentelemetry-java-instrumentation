# the benefit of this over renovate is that this also analyzes transitive dependencies
# while renovate (at least currently) only analyzes top-level dependencies
name: Sonatype Guide dependency audit (daily)

on:
  schedule:
    - cron: "30 1 * * *" # daily at 1:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Free disk space
        run: .github/scripts/gha-free-disk-space.sh

      - name: Set up JDK for running Gradle
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version-file: .java-version

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew :javaagent:ossIndexAudit --no-configuration-cache
        id: audit
        continue-on-error: true
        env:
          SONATYPE_GUIDE_PAT: ${{ secrets.SONATYPE_GUIDE_PAT }}

      - name: Print vulnerability report
        if: steps.audit.outcome == 'failure'
        run: |
          echo "=== Sonatype Guide Vulnerability Report ==="
          cat oss-index-cyclonedx-bom.json
          exit 1

  workflow-notification:
    permissions:
      issues: write
    needs:
      - analyze
    if: always()
    uses: open-telemetry/shared-workflows/.github/workflows/workflow-failure-issue.yml@62d5939b47144252763c5ff9fffe8c20d76cd806 # v0.4.0
    with:
      success: ${{ needs.analyze.result == 'success' }}
