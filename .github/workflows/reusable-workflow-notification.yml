# this is useful because notifications for scheduled workflows are only sent to the user who
# initially created the given workflow
name: Reusable - Workflow notification

on:
  workflow_call:
    inputs:
      success:
        type: boolean
        required: true
      title:
        type: string
        required: false
        description: "Custom title for the issue (defaults to 'Workflow failed: $GITHUB_WORKFLOW')"
      failure-notification-after-attempts:
        type: number
        required: false
        default: 0
        description: "Only notify on failure after this many workflow run attempts"

permissions:
  contents: read

jobs:
  workflow-notification:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    if: ${{ inputs.success || github.run_attempt > inputs.failure-notification-after-attempts }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Open issue or add comment if issue already open
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_SUCCESS: ${{ inputs.success }}
          INPUT_TITLE: ${{ inputs.title }}
        run: |
          # Use custom title if provided, otherwise use default
          if [[ -n "$INPUT_TITLE" ]]; then
            issue_title="$INPUT_TITLE"
          else
            issue_title="Workflow failed: $GITHUB_WORKFLOW"
          fi

          # TODO (trask) search doesn't support exact phrases, so it's possible that this could grab the wrong issue
          number=$(gh issue list --search "in:title $issue_title" --limit 1 --json number -q .[].number)

          echo "$number"
          echo "$INPUT_SUCCESS"

          issue_body="See [$GITHUB_WORKFLOW #$GITHUB_RUN_NUMBER](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)."

          if [[ $number ]]; then
            if [[ "$INPUT_SUCCESS" == "true" ]]; then
              gh issue close "$number"
            else
              gh issue comment "$number" --body "$issue_body"
            fi
          elif [[ "$INPUT_SUCCESS" == "false" ]]; then
            gh issue create --title "$issue_title (#$GITHUB_RUN_NUMBER)" --body "$issue_body"
          fi
