name: Rerun failed daily jobs

on:
  # zizmor dangerous-triggers suppression rationale: uses only the trusted default-branch rerun script
  # and treats the run ID as data.
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows:
      - "Build (daily)"
      - "Build (daily --no-build-cache)"
      - "Daily GraalVM native tests"
      - "Publish Servlet images for smoke tests"
    types:
      - completed

concurrency:
  group: rerun-failed-daily-jobs
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rerun-failed-jobs:
    permissions:
      contents: read
      actions: write
      issues: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Rerun eligible failed jobs
        env:
          CREATE_WORKFLOW_FAILURE_ISSUE: "true"
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: python .github/scripts/rerun-failed-workflow-jobs.py
