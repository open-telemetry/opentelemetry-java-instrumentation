name: Update latest dep versions

on:
  schedule:
    # daily at 4:12 UTC
    - cron: "12 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-latest-dep-versions:
    permissions:
      contents: write  # for git push to PR branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Free disk space
        run: .github/scripts/gha-free-disk-space.sh

      - name: Set up JDK for running Gradle
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Resolve latest dep versions
        run: >
          ./gradlew resolveLatestDepVersions
          -PtestLatestDeps=true
          -PresolveLatestDeps=true

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet .github/config/latest-dep-versions.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Use CLA approved bot
        if: steps.check-changes.outputs.changed == 'true'
        run: .github/scripts/use-cla-approved-bot.sh

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        if: steps.check-changes.outputs.changed == 'true'
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_CLIENT_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Create pull request
        if: steps.check-changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # pull requests from secrets.GITHUB_TOKEN do not run workflows
          OTELBOT_TOKEN: ${{ steps.otelbot-token.outputs.token }}
        run: |
          gh auth setup-git
          message="Update pinned latest dep versions"
          body="Auto-generated update of pinned latest dependency versions used by \`testLatestDeps\` builds."
          branch="otelbot/update-latest-dep-versions"

          git checkout -b $branch
          git add .github/config/latest-dep-versions.json
          git commit -m "$message"

          # Dependency resolution can take long enough for workflow files on main to change after
          # checkout. GitHub then rejects pushing the stale branch without workflows: write, even
          # though the generated commit only changes latest-dep-versions.json. Merge instead of
          # rebase so that commit remains tied to its source snapshot while the pushed branch
          # contains the current workflow files.
          git fetch origin main
          if ! git merge --no-edit origin/main; then
            echo "::error::Failed to merge the latest origin/main into the generated dependency update."
            git merge --abort
            exit 1
          fi

          # If the remote branch already exists, only force-push when its tip
          # was authored by otelbot. This preserves any manual commits that
          # may have pushed on top of an open auto-PR.
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null; then
            git fetch origin "$branch"
            author_email=$(git log -1 --format='%ae' "origin/$branch")
            if [ "$author_email" != "197425009+otelbot@users.noreply.github.com" ]; then
              echo "Remote tip of $branch was authored by $author_email (not otelbot); skipping push." >&2
              exit 0
            fi
          fi
          git push --force-with-lease --set-upstream origin $branch

          # only create a new PR if one doesn't already exist
          existing_pr=$(GH_TOKEN="$OTELBOT_TOKEN" gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          if [ -z "$existing_pr" ]; then
            GH_TOKEN="$OTELBOT_TOKEN" gh pr create \
              --title "$message" \
              --body "$body" \
              --base main
          fi

  workflow-notification:
    permissions:
      issues: write
    needs:
      - update-latest-dep-versions
    if: always()
    uses: open-telemetry/shared-workflows/.github/workflows/workflow-failure-issue.yml@62d5939b47144252763c5ff9fffe8c20d76cd806 # v0.4.0
    with:
      success: ${{ needs.update-latest-dep-versions.result == 'success' }}
