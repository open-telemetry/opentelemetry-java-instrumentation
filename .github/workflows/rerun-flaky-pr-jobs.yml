name: Rerun flaky PR jobs

on:
  workflow_run:
    # zizmor: ignore[dangerous-triggers] Uses only the trusted default-branch rerun
    # script and treats the run ID as data.
    workflows:
      - "Build pull request"
      - "CodeQL"
      - "PR build Servlet images for smoke tests"
    types:
      - completed

concurrency:
  group: rerun-flaky-pr-jobs
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rerun-failed-jobs:
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Rerun eligible failed jobs
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: python .github/scripts/rerun-failed-workflow-jobs.py
